name: kisan_mitra
description: "A Flutter application for farmers (Kisan Mitra) with offline support, market prices, and weather updates."
# The following line prevents the package from being accidentally published to pub.dev.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Network & API
  http: ^1.1.0
  
  # Data Persistence
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # UI & Animations
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  
  # Device Capabilities
  geolocator: ^13.0.0
  image_picker: ^1.0.7
  
  # Utility
  intl: ^0.19.0
  
  # Accessibility & Voice
  flutter_tts: ^3.8.5
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package contains a set of recommended lints to
  # encourage good coding practices.
  flutter_lints: ^3.0.0

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - images/
    # - images/app_logo.png
    # - images/chilli.jpg
    # - images/cotton.jpeg
    # - images/groundnut.jpeg
    # - images/maize.jpeg
    # - images/mango.jpeg
    # - images/onion.jpeg
    # - images/potato.jpeg
    # - images/rice.jpeg
    # - images/tomato.jpg
    # - images/turmeric.jpeg
    # - images/wheat.jpeg

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
